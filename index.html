<!-- =========================================
     LANGUAGE SWITCHER (ADD INSIDE HEADER)
========================================= -->

<!-- Add this inside .navbar -->
<div class="language-switcher">
  <button onclick="setLanguage('hy')">Հայ</button>
  <button onclick="setLanguage('en')">EN</button>
  <button onclick="setLanguage('ru')">RU</button>
</div>


<!-- =========================================
     ADD data-lang ATTRIBUTES TO TEXTS
========================================= -->

<!-- Example -->

<h1 
data-hy="Գեղեցիկ եղունգներ և գեղեցկության ծառայություններ"
data-en="Beautiful Nails & Beauty Services"
data-ru="Красивые ногти и услуги красоты">
Գեղեցիկ եղունգներ և գեղեցկության ծառայություններ
</h1>

<p
data-hy="Ժամանակակից գեղեցկության սրահ Երևանում"
data-en="Modern beauty studio in Yerevan"
data-ru="Современная студия красоты в Ереване">
Ժամանակակից գեղեցկության սրահ Երևանում
</p>


<!-- =========================================
     ADD THIS CSS
========================================= -->

<style>

.language-switcher{
  display:flex;
  gap:10px;
}

.language-switcher button{
  border:none;
  background:#7b2cbf;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.language-switcher button:hover{
  background:#9d4edd;
  transform:translateY(-2px);
}

</style>


<!-- =========================================
     JAVASCRIPT FOR LANGUAGE SWITCHING
========================================= -->

<script>

function setLanguage(lang){

  // find all elements with translations
  const elements = document.querySelectorAll('[data-hy]');

  elements.forEach(el => {

    // replace text
    el.innerHTML = el.getAttribute(`data-${lang}`);

  });

  // save selected language
  localStorage.setItem('language', lang);
}


// load saved language
window.onload = () => {

  const savedLang = localStorage.getItem('language') || 'hy';

  setLanguage(savedLang);

};

</script>
