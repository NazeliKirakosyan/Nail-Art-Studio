<!-- 
Փոխիր այս հատվածները քո CSS-ի մեջ,
որպեսզի նկարները չկտրվեն և ամբողջությամբ երևան։
-->

<style>

/* =========================
   GLOBAL IMAGE STYLE
========================== */
img{
  width:100%;
  display:block;
}

/* =========================
   ABOUT IMAGE
========================== */
.about-image img{
  border-radius:25px;
  box-shadow:0 10px 30px rgba(123,44,191,0.15);

  /* Ամբողջ նկարը ցույց տալ */
  object-fit:contain;

  /* Բարձրությունը ավտոմատ */
  height:auto;

  background:#fff;
}

/* =========================
   SERVICE CARDS IMAGES
========================== */
.service-card img{

  /* FIXED HEIGHT-ը հանի */
  width:100%;
  height:auto;

  /* Չկտրի նկարները */
  object-fit:contain;

  background:#fff;
  padding:10px;
}

/* =========================
   PROMO IMAGE
========================== */
.promo-image{
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.promo-image img{

  /* Չկտրի */
  object-fit:contain;

  width:100%;
  height:auto;

  max-height:none;
}

/* =========================
   SERVICE CARD
========================== */
.service-card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(123,44,191,0.15);
  transition:0.3s;
  padding-bottom:15px;
}

.service-card:hover{
  transform:translateY(-8px);
}

</style>
